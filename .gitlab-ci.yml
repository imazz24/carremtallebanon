# =====================================================
# Car Rental — CI/CD (shell-executor pattern)
#
# Runs on a shell GitLab Runner (no Docker image pulls) — same
# arrangement as gitlab.rnd.com/root/whavester. The runner host
# needs `python3` + `pip` + `docker` available; jobs install
# everything else into per-pipeline venvs so jobs stay hermetic.
#
# Stages:
#   test    → ruff (pyflakes) + backend import smoke.
#   deploy  → SFTP the tree to the deploy host via paramiko, then
#             run `docker compose up -d --build --force-recreate`
#             remotely. Manual trigger, main-only.
#
# JS lint is intentionally omitted — the shell runner doesn't have
# `node` installed, and a vanilla-JS frontend with no build step
# surfaces syntax errors in the browser on first load. If `node`
# ever lands on the runner, add the `node --check` loop back to
# the test job's script (it was in commit 81eb167 before this).
# =====================================================

stages:
  - test
  - deploy

default:
  tags:
    - shell
  interruptible: true

variables:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_INPUT: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"


# ----------------------------------------------------------
# TEST — lint (ruff + node --check) + import smoke.
# ----------------------------------------------------------
test:
  stage: test
  script:
    - python3 --version
    - python3 -m venv .venv
    - . .venv/bin/activate
    - pip install -U pip wheel
    - pip install -r backend/requirements.txt ruff==0.6.9
    # 1. ruff with --select F runs the pyflakes rule set (real
    #    bugs: unused imports, undefined names, syntax errors).
    #    --exclude testvin.py because that file is a stale FastAPI
    #    demo with mixed imports, not part of the running app.
    - ruff check backend/ --select F --exclude backend/.venv --exclude backend/testvin.py
    # 2. Smoke import — does the Flask app boot? db.py reads
    #    DB_* env vars lazily, so no real Postgres is needed for
    #    `import app` to succeed.
    - cd backend && python -c "import app; print('import OK, route count:', len(list(app.app.url_map.iter_rules())))"


# ----------------------------------------------------------
# DEPLOY — runner-host gunicorn (no Docker, no SSH).
# ----------------------------------------------------------
# The runner host has Python but neither docker nor docker compose,
# so we just run gunicorn daemonized on the same host. The app
# connects to whatever Postgres the runner can reach, configured
# via a one-time .env file at $DEPLOY_HOST_DIR/backend/.env.
#
# Required one-time setup on the runner host (do this once,
# manually — the deploy job never touches your .env):
#
#   mkdir -p /home/gitlab-runner/carrental-prod/backend
#   cat > /home/gitlab-runner/carrental-prod/backend/.env <<'EOF'
#   DB_HOST=localhost
#   DB_PORT=5432
#   DB_NAME=carrental
#   DB_USER=postgres
#   DB_PASSWORD=admin
#   FLASK_PORT=5000
#   EOF
#
# The Postgres instance the app talks to has to already exist on
# whatever DB_HOST points at. The CI doesn't provision it.
#
# Want a real remote deploy later? Bring back the paramiko version
# from commit a17f760 — scripts/ci_deploy.py is still in the repo.
deploy:
  stage: deploy
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: on_success
    - when: never
  variables:
    # Persistent home for the app, outside the per-pipeline build dir.
    DEPLOY_HOST_DIR: "/home/gitlab-runner/carrental-prod"
    PIDFILE:         "/home/gitlab-runner/carrental-prod/gunicorn.pid"
    LOGFILE:         "/home/gitlab-runner/carrental-prod/gunicorn.log"
    BIND_ADDR:       "0.0.0.0:5000"
  script:
    # 1. Stage the working tree into the persistent deploy dir.
    #    Crucially EXCLUDE backend/.env so the operator-managed
    #    file with real DB credentials persists across deploys.
    - mkdir -p "$DEPLOY_HOST_DIR"
    - |
      if command -v rsync >/dev/null 2>&1; then
        rsync -a --delete \
          --exclude='.git' \
          --exclude='.venv' \
          --exclude='.deploy-venv' \
          --exclude='backend/.venv' \
          --exclude='backend/__pycache__' \
          --exclude='backend/uploads' \
          --exclude='backend/.env' \
          --exclude='.cache' \
          --exclude='gunicorn.pid' \
          --exclude='gunicorn.log' \
          ./ "$DEPLOY_HOST_DIR/"
      else
        cp -a ./. "$DEPLOY_HOST_DIR/"
      fi
    # 2. Sanity check: warn loudly if backend/.env is missing —
    #    the app will boot but every DB call will fail until it's
    #    there.
    - |
      if [ ! -f "$DEPLOY_HOST_DIR/backend/.env" ]; then
        echo "WARNING: $DEPLOY_HOST_DIR/backend/.env is missing."
        echo "         The app will start but DB queries will fail."
        echo "         Create it once with your real DB credentials"
        echo "         (see the comment block at the top of this job)."
      fi
    # 3. (Re)build the venv and install requirements + gunicorn.
    - cd "$DEPLOY_HOST_DIR"
    - test -d .venv || python3 -m venv .venv
    - . .venv/bin/activate
    - pip install --quiet -U pip wheel
    - pip install --quiet -r backend/requirements.txt gunicorn==23.0.0
    # 4. Stop any previous gunicorn cleanly via its pid file.
    - |
      if [ -f "$PIDFILE" ]; then
        oldpid=$(cat "$PIDFILE" || true)
        if [ -n "$oldpid" ] && kill -0 "$oldpid" 2>/dev/null; then
          echo "stopping old gunicorn (pid $oldpid)"
          kill "$oldpid" || true
          for i in 1 2 3 4 5; do
            if kill -0 "$oldpid" 2>/dev/null; then sleep 1; else break; fi
          done
          kill -9 "$oldpid" 2>/dev/null || true
        fi
        rm -f "$PIDFILE"
      fi
    # 5. Start the new gunicorn daemonized so it survives the CI
    #    job exit. --daemon double-forks, escaping the runner's
    #    process group; the pid file lets us stop it next deploy.
    - cd "$DEPLOY_HOST_DIR/backend"
    - |
      "$DEPLOY_HOST_DIR/.venv/bin/gunicorn" \
        --bind "$BIND_ADDR" \
        --workers 2 \
        --timeout 60 \
        --daemon \
        --pid "$PIDFILE" \
        --access-logfile "$LOGFILE" \
        --error-logfile "$LOGFILE" \
        app:app
    # 6. Verify it actually came up.
    - sleep 2
    - |
      if [ ! -f "$PIDFILE" ]; then
        echo "FAIL: gunicorn pidfile missing after start"
        tail -30 "$LOGFILE" 2>/dev/null || true
        exit 1
      fi
      newpid=$(cat "$PIDFILE")
      if ! kill -0 "$newpid" 2>/dev/null; then
        echo "FAIL: gunicorn pid $newpid not alive"
        tail -30 "$LOGFILE" 2>/dev/null || true
        exit 1
      fi
      echo "gunicorn running, pid=$newpid, bind=$BIND_ADDR"
    - tail -30 "$LOGFILE" 2>/dev/null || true
  environment:
    name: production
    url: http://localhost:5000
