# =====================================================
# Car Rental — CI/CD
#
# Stages:
#   lint    → Python (ruff) + JS (node --check) syntax/style.
#   test    → Smoke import of backend/app.py to catch crashes
#             that would only show up at server boot.
#   sast    → GitLab's built-in static-application-security scan
#             (Bandit, Semgrep, etc. — pulled from the template).
#   deploy  → Manual rsync + remote restart over SSH. Runs only on
#             pushes to `main`; needs CI variables (see notes
#             below) to know where to deploy.
#
# Docker images are pulled from the internal mirror
# `registry.rnd.com/library/*` because the runner network can't
# reach Docker Hub directly. The runner authenticates to that
# mirror using a `DOCKER_AUTH_CONFIG` CI variable — see the README
# section at the bottom of this file for how to set it.
# =====================================================

include:
  - template: Security/SAST.gitlab-ci.yml

stages:
  - lint
  - test
  - sast       # injected by the SAST template above
  - deploy

# Speed up Python jobs by caching pip's wheel cache between runs.
.pip-cache: &pip-cache
  variables:
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  cache:
    key:
      files:
        - backend/requirements.txt
    paths:
      - .cache/pip


# ----------------------------------------------------------
# LINT
# ----------------------------------------------------------
lint:python:
  stage: lint
  image: registry.rnd.com/library/python:3.12-slim
  <<: *pip-cache
  before_script:
    - pip install --quiet ruff==0.6.9
  script:
    # `ruff check --select F` runs the pyflakes rule set: unused
    # imports, undefined names, redefined symbols, syntax errors —
    # actual bugs, not stylistic preferences. Add `E` or `W` rules
    # later if you want strict PEP 8 enforcement.
    - ruff check backend/ --select F --exclude backend/.venv --exclude backend/testvin.py


lint:js:
  stage: lint
  image: registry.rnd.com/library/node:20-alpine
  script:
    # node --check parses each file and fails on syntax errors. It's
    # the lightest possible JS lint — no rule set, just "does this
    # parse?". Good enough for a vanilla-JS frontend.
    - |
      set -e
      fail=0
      for f in $(find frontend/js -name '*.js'); do
        echo "checking $f"
        node --check "$f" || fail=1
      done
      exit $fail


# ----------------------------------------------------------
# TEST — import smoke
# ----------------------------------------------------------
test:smoke:
  stage: test
  image: registry.rnd.com/library/python:3.12-slim
  <<: *pip-cache
  before_script:
    # psycopg2-binary needs no system packages; the rest are pure
    # Python. If a binary wheel is ever missing, add
    #   apt-get install -y --no-install-recommends gcc libpq-dev
    # here.
    - pip install --quiet -r backend/requirements.txt
  script:
    # Importing app.py runs every module-level statement (Flask app
    # construction, decorator registration). DB connections in db.py
    # are lazy — they only fire when query()/execute() actually runs
    # — so we don't need a Postgres service for this smoke.
    - cd backend
    - python -c "import app; print('import OK, route count:', len(list(app.app.url_map.iter_rules())))"


# ----------------------------------------------------------
# DEPLOY — manual, main-only, SSH rsync
# ----------------------------------------------------------
# Set these as CI/CD variables in GitLab UI (Settings → CI/CD →
# Variables). Mark the SSH key as `File` type, protected, masked:
#
#   SSH_PRIVATE_KEY      — private key (File type), authorised on
#                          the target server's deploy account.
#   SSH_KNOWN_HOSTS      — output of `ssh-keyscan <DEPLOY_HOST>`.
#                          Prevents the "host key verification
#                          failed" prompt without disabling the
#                          check entirely.
#   DEPLOY_USER          — e.g. `deploy`
#   DEPLOY_HOST          — e.g. `app.rnd.com` or `10.20.30.40`
#   DEPLOY_PATH          — absolute path on the host, e.g.
#                          `/srv/carrental`
#   DEPLOY_RESTART_CMD   — (optional) e.g.
#                          `sudo systemctl restart carrental`.
#                          Default below.
#
deploy:server:
  stage: deploy
  image: registry.rnd.com/library/alpine:3.20
  rules:
    # Only run on the main branch (not on MRs, tags, etc.).
    # `when: manual` requires a click on the GitLab Pipelines page
    # to actually deploy — protects against unintentional
    # production pushes on every commit.
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
  variables:
    DEPLOY_RESTART_CMD: "sudo systemctl restart carrental"
  before_script:
    - apk add --no-cache openssh-client rsync
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    # SSH_PRIVATE_KEY is delivered as a file by GitLab. Copy it
    # into the standard location and tighten permissions so SSH
    # doesn't refuse to use it.
    - cp "$SSH_PRIVATE_KEY" ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - echo "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
  script:
    # rsync the working tree to the target. --delete removes files
    # on the server that no longer exist locally. The exclude list
    # mirrors .gitignore plus a few CI-only paths.
    - |
      rsync -az --delete \
        --exclude='.git' \
        --exclude='.gitlab-ci.yml' \
        --exclude='backend/.venv' \
        --exclude='backend/.env' \
        --exclude='backend/__pycache__' \
        --exclude='backend/uploads' \
        --exclude='.cache' \
        ./ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"
    # Update the target's venv and restart the Flask service. The
    # venv is created on first deploy if it doesn't already exist.
    - |
      ssh "$DEPLOY_USER@$DEPLOY_HOST" "
        set -e
        cd '$DEPLOY_PATH'
        if [ ! -d backend/.venv ]; then python3 -m venv backend/.venv; fi
        backend/.venv/bin/pip install --quiet -r backend/requirements.txt
        $DEPLOY_RESTART_CMD
      "
  environment:
    name: production
    url: http://$DEPLOY_HOST
