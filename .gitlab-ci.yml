# =====================================================
# Car Rental — CI/CD (shell-executor pattern)
#
# Runs on a shell GitLab Runner (no Docker image pulls) — same
# arrangement as gitlab.rnd.com/root/whavester. The runner host
# needs `python3` + `pip` + `docker` available; jobs install
# everything else into per-pipeline venvs so jobs stay hermetic.
#
# Stages:
#   test    → ruff (pyflakes) + backend import smoke.
#   deploy  → SFTP the tree to the deploy host via paramiko, then
#             run `docker compose up -d --build --force-recreate`
#             remotely. Manual trigger, main-only.
#
# JS lint is intentionally omitted — the shell runner doesn't have
# `node` installed, and a vanilla-JS frontend with no build step
# surfaces syntax errors in the browser on first load. If `node`
# ever lands on the runner, add the `node --check` loop back to
# the test job's script (it was in commit 81eb167 before this).
# =====================================================

stages:
  - test
  - deploy

default:
  tags:
    - shell
  interruptible: true

variables:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_INPUT: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"


# ----------------------------------------------------------
# TEST — lint (ruff + node --check) + import smoke.
# ----------------------------------------------------------
test:
  stage: test
  script:
    - python3 --version
    - python3 -m venv .venv
    - . .venv/bin/activate
    - pip install -U pip wheel
    - pip install -r backend/requirements.txt ruff==0.6.9
    # 1. ruff with --select F runs the pyflakes rule set (real
    #    bugs: unused imports, undefined names, syntax errors).
    #    --exclude testvin.py because that file is a stale FastAPI
    #    demo with mixed imports, not part of the running app.
    - ruff check backend/ --select F --exclude backend/.venv --exclude backend/testvin.py
    # 2. Smoke import — does the Flask app boot? db.py reads
    #    DB_* env vars lazily, so no real Postgres is needed for
    #    `import app` to succeed.
    - cd backend && python -c "import app; print('import OK, route count:', len(list(app.app.url_map.iter_rules())))"


# ----------------------------------------------------------
# DEPLOY — manual, main-only, paramiko + docker compose.
# ----------------------------------------------------------
# Required CI variables (Settings → CI/CD → Variables):
#   CARRENTAL_HOST          deploy server IP/hostname
#   CARRENTAL_USER          SSH user on that host
#   CARRENTAL_PASS          SSH password (mark masked + protected)
#   CARRENTAL_REMOTE_DIR    optional, defaults to /home/$USER/carrental
#
# The target host must have `docker` and `docker compose v2`
# installed and the SSH user able to run them.
deploy:
  stage: deploy
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
    - when: never
  script:
    - python3 -m venv .deploy-venv
    - . .deploy-venv/bin/activate
    - pip install --quiet paramiko==3.5.0
    - python scripts/ci_deploy.py
  environment:
    name: production
    url: http://$CARRENTAL_HOST:5000
