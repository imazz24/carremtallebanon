# =====================================================
# Car Rental — CI/CD (shell-executor pattern)
#
# Runs on a shell GitLab Runner (no Docker image pulls) — same
# arrangement as gitlab.rnd.com/root/whavester. The runner host
# needs `python3` + `pip` + `docker` available; jobs install
# everything else into per-pipeline venvs so jobs stay hermetic.
#
# Stages:
#   test    → ruff (pyflakes) + backend import smoke.
#   deploy  → SFTP the tree to the deploy host via paramiko, then
#             run `docker compose up -d --build --force-recreate`
#             remotely. Manual trigger, main-only.
#
# JS lint is intentionally omitted — the shell runner doesn't have
# `node` installed, and a vanilla-JS frontend with no build step
# surfaces syntax errors in the browser on first load. If `node`
# ever lands on the runner, add the `node --check` loop back to
# the test job's script (it was in commit 81eb167 before this).
# =====================================================

stages:
  - test
  - deploy

default:
  tags:
    - shell
  interruptible: true

variables:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_INPUT: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"


# ----------------------------------------------------------
# TEST — lint (ruff + node --check) + import smoke.
# ----------------------------------------------------------
test:
  stage: test
  script:
    - python3 --version
    - python3 -m venv .venv
    - . .venv/bin/activate
    - pip install -U pip wheel
    - pip install -r backend/requirements.txt ruff==0.6.9
    # 1. ruff with --select F runs the pyflakes rule set (real
    #    bugs: unused imports, undefined names, syntax errors).
    #    --exclude testvin.py because that file is a stale FastAPI
    #    demo with mixed imports, not part of the running app.
    - ruff check backend/ --select F --exclude backend/.venv --exclude backend/testvin.py
    # 2. Smoke import — does the Flask app boot? db.py reads
    #    DB_* env vars lazily, so no real Postgres is needed for
    #    `import app` to succeed.
    - cd backend && python -c "import app; print('import OK, route count:', len(list(app.app.url_map.iter_rules())))"


# ----------------------------------------------------------
# DEPLOY — runner-host self-deploy (no SSH, no CI variables).
# ----------------------------------------------------------
# This deploys the app to the SAME machine the GitLab Runner runs on
# by invoking `docker compose up -d --build --force-recreate` in the
# job's checkout directory. The runner already has docker available
# (same host whavester deploys against) so no network round-trip or
# remote credentials are needed.
#
# The compose project is persisted under a stable name + path so the
# app survives between pipelines:
#   - DEPLOY_HOST_DIR is a path on the runner host *outside* the
#     per-pipeline build dir (which GitLab wipes after every job).
#     We rsync into it, then `docker compose up -d --build` there so
#     named volumes (carrental_pg) keep their data across deploys.
#
# To switch to a real remote SSH/SFTP deploy later, revert this job
# to the paramiko script — see scripts/ci_deploy.py (still in the
# repo) and the deploy block in commit a17f760.
deploy:
  stage: deploy
  rules:
    # Auto-deploy on every successful main pipeline. Switch back to
    # `when: manual` if you want a play-button gate before deploys.
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: on_success
    - when: never
  variables:
    # The runner home is /home/gitlab-runner — confirmed from the
    # failing job log (`/home/gitlab-runner/builds/...`). The deploy
    # dir lives next to it so it survives `git clean -fdx` and the
    # per-pipeline build-dir wipe.
    DEPLOY_HOST_DIR: "/home/gitlab-runner/carrental-prod"
  script:
    # 1. Stage the working tree into the persistent deploy dir.
    #    rsync is in coreutils on virtually every Linux distro; falls
    #    back to `cp -a` if it isn't.
    - mkdir -p "$DEPLOY_HOST_DIR"
    - |
      if command -v rsync >/dev/null 2>&1; then
        rsync -a --delete \
          --exclude='.git' \
          --exclude='.venv' \
          --exclude='.deploy-venv' \
          --exclude='backend/.venv' \
          --exclude='backend/__pycache__' \
          --exclude='backend/uploads' \
          --exclude='.cache' \
          ./ "$DEPLOY_HOST_DIR/"
      else
        cp -a ./. "$DEPLOY_HOST_DIR/"
      fi
    # 2. Build + (re)start the stack. --force-recreate is the
    #    load-bearing flag: without it, compose skips recreating
    #    containers whose config hash didn't change, even when the
    #    image was rebuilt from new source. Symptom: deploy says OK
    #    but the running container still serves old code.
    - cd "$DEPLOY_HOST_DIR"
    - docker compose build --pull=false
    - docker compose up -d --force-recreate
    # 3. Visibility: what's running, last few lines of app logs.
    - docker compose ps
    - docker compose logs --tail=30 app || true
  environment:
    name: production
    url: http://localhost:5000
