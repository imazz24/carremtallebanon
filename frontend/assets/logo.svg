<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" role="img" aria-label="Car Rental">
  <defs>
    <linearGradient id="crTile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#a5b4fc"/>
    </linearGradient>
  </defs>
  <rect width="48" height="48" rx="12" fill="url(#crTile)"/>
  <!-- speed / motion lines -->
  <g stroke="#ffffff" stroke-linecap="round" fill="none">
    <line x1="5"  y1="20" x2="13" y2="20" stroke-width="2.4" opacity="0.9"/>
    <line x1="4"  y1="26" x2="10" y2="26" stroke-width="2.4" opacity="0.55"/>
  </g>
  <!-- car body -->
  <rect x="11" y="24" width="32" height="8.4" rx="3" fill="#ffffff"/>
  <!-- cabin -->
  <path d="M17.5 24 L21 18.6 C21.5 17.8 22.4 17.3 23.3 17.3 L30.8 17.3 C31.7 17.3 32.5 17.7 33.1 18.4 L37.6 24 Z" fill="#ffffff"/>
  <!-- window -->
  <path d="M21.8 23 L23.9 19.7 C24.1 19.4 24.4 19.2 24.8 19.2 L29.2 19.2 L31.2 23 Z" fill="#4338ca" opacity="0.45"/>
  <!-- wheels -->
  <circle cx="19.5" cy="33" r="4" fill="#312e81"/>
  <circle cx="19.5" cy="33" r="1.5" fill="#ffffff"/>
  <circle cx="35"   cy="33" r="4" fill="#312e81"/>
  <circle cx="35"   cy="33" r="1.5" fill="#ffffff"/>
</svg>
